name: Check Yandex Cloud VM

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  check-vm:
    runs-on: ubuntu-latest

    steps:
      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Configure YC CLI
        run: |
          echo '${{ secrets.YC_KEY }}' > key.json

          yc config profile create default || true

          yc config set service-account-key key.json
          yc config set cloud-id ${{ secrets.YC_CLOUD_ID }}
          yc config set folder-id ${{ secrets.YC_FOLDER_ID }}

      - name: Check VM status
        run: |
          STATUS=$(yc compute instance get ${{ secrets.YC_VM_ID }} --format json | jq -r .status)

          echo "Current VM status: $STATUS"

          if [ "$STATUS" != "RUNNING" ]; then
            echo "VM is stopped. Starting..."
            yc compute instance start ${{ secrets.YC_VM_ID }}
          else
            echo "VM is already running."
          fi
